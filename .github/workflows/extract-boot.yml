name: Extract boot.img from OTA

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: "Direct OTA ZIP URL"
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

          pip install protobuf bsdiff4

          git clone https://github.com/vm03/payload_dumper.git

      - name: Download OTA
        run: |
          curl -L --fail --retry 5 \
            -o ota.zip \
            "${{ github.event.inputs.ota_url }}"

      - name: Extract payload.bin
        run: |
          unzip -j ota.zip payload.bin

      - name: Extract boot images
        run: |
          mkdir output

          python payload_dumper/payload_dumper.py \
            --images boot init_boot vendor_boot \
            --out output \
            payload.bin

          ls -lah output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boot-images
          path: output/*
          retention-days: 7
          compression-level: 0