name: Extract boot.img from OTA

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: "Direct OTA ZIP URL"
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip

      - name: Install payload-dumper-go
        run: |
          go install github.com/ssut/payload-dumper-go/cmd/payload-dumper-go@latest

          echo "$HOME/go/bin" >> "$GITHUB_PATH"

          payload-dumper-go --help

      - name: Download OTA package
        run: |
          curl -L --fail --retry 5 \
            -o ota.zip \
            "${{ github.event.inputs.ota_url }}"

          ls -lh ota.zip

      - name: Extract boot partitions
        run: |
          mkdir -p output

          payload-dumper-go \
            -p boot,init_boot,vendor_boot \
            -o output \
            ota.zip

          ls -lah output

      - name: Verify boot.img
        run: |
          test -f output/boot.img

      - name: Generate checksums
        run: |
          cd output
          sha256sum *.img > SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extracted-images
          path: output/*
          retention-days: 7
          compression-level: 0
